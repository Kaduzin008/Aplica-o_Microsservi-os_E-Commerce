<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fazer Pedido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button onclick="window.location.href='perfil.html'" style="margin-bottom: 20px;">Ver Meu Perfil</button>
        <h2>Fazer Pedido</h2>
        <p>Logado como ID: <span id="displayId"></span></p>

        <!-- LINHA 1: Produto -->
        <div style="margin-bottom: 15px; text-align: left;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Escolha o Produto:</label>
            <select id="produtoSelect" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                <!-- As opções virão do banco de dados -->
            </select>
        </div>

        <!-- LINHA 2: Quantidade -->
        <div style="margin-bottom: 20px; text-align: left;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Quantidade:</label>
            <input type="number" id="qtd" value="1" min="1" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        </div>
        
        <button class="btn-primary" onclick="gerarPedido()" style="width: 100%;">Verificar e Comprar</button>
    </div>

    <script>
        document.getElementById('displayId').innerText = localStorage.getItem('usuarioId');

        async function carregarCatalogo() {
            try {
                // Coloque aqui a URL certa que você descobriu no passo anterior
                const res = await fetch('http://localhost:3003/catalogos'); 
                const produtos = await res.json();
                const select = document.getElementById('produtoSelect');
                console.log("MEUS PRODUTOS:", produtos);
                
                produtos.forEach(p => {
                    let option = document.createElement('option');
                    
                    // CORREÇÃO DO UNDEFINED:
                    // Tenta achar 'produto', se não achar tenta 'nome', se não achar tenta 'descricao'
                    const nomeDoProduto = p.produto_catalogo;
                    
                    option.value = nomeDoProduto; 
                    option.text = `${nomeDoProduto} - R$ ${p.preco}`;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error("Erro ao carregar catálogo", err);
            }
        }

        async function gerarPedido() {
            const dados = {
                id_usuario: parseInt(localStorage.getItem('usuarioId')),
                produto: document.getElementById('produtoSelect').value,
                quantidade: parseInt(document.getElementById('qtd').value)
            };

            const response = await fetch('http://localhost:3002/pedido', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const resultado = await response.json();

            if (response.ok) {
                localStorage.setItem('ultimoPedidoId', resultado.pedido.id_pedido);
                window.location.href = 'pagamento.html';
            } else {
                alert("Erro: " + resultado.error);
            }
        }

        carregarCatalogo();
    </script>
</body>
</html>
