<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registrar - eCommerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Criar Conta</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-primary" onclick="registrar()">Cadastrar</button>
        <a href="login.html" style="display:block; margin-top:10px;">Já tenho conta</a>
    </div>

    <script>
        async function registrar() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            const res = await fetch('http://localhost:3001/usuario', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha })
            });

            if (res.ok) {
                alert("Usuário criado com sucesso!");
                window.location.href = 'login.html';
            } else {
                alert("Erro ao registrar");
            }
        }
    </script>
</body>
</html>
